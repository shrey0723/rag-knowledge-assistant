server.port=4001

# H2 file-based database - zero setup, creates ./data/ragdb.mv.db on first run
spring.datasource.url=jdbc:h2:file:./data/ragdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# Gemini API config - set GEMINI_API_KEY as an environment variable, never hardcode it here
gemini.api.key=${GEMINI_API_KEY:}
gemini.embedding.model=models/gemini-embedding-001
gemini.generation.model=models/gemini-2.5-flash

logging.level.org.springframework=INFO
logging.level.com.ittools.ragassistant=INFO
