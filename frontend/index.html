<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Knowledge Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  :root{
    --bg:#F4F6F8; --panel:#FFFFFF; --ink:#141922; --muted:#5B6472; --line:#E3E7EC;
    --accent:#0E7C7B; --accent-soft:#E3F4F3;
    --good:#0E8A5F; --good-soft:#E6F6EF;
    --bad:#C4402C; --bad-soft:#FCEAE7;
    --wait:#B7791F; --wait-soft:#FBF1DF;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}
  .shell{max-width:1180px;margin:0 auto;padding:32px 24px 64px;}
  header.top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#0B5B5A);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;}
  h1{font-size:19px;margin:0;letter-spacing:-0.01em;}
  .sub{color:var(--muted);font-size:13px;margin-top:2px;}

  .grid-top{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  @media (max-width:760px){.grid-top{grid-template-columns:repeat(2,1fr);}}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;}
  .stat .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
  .stat .value{font-size:22px;font-weight:700;margin-top:6px;}

  .layout{display:grid;grid-template-columns:1fr 1.2fr;gap:16px;align-items:start;}
  @media (max-width:920px){.layout{grid-template-columns:1fr;}}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;}
  .panel h2{font-size:14.5px;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .panel h2 .badge{font-size:10.5px;background:var(--accent-soft);color:var(--accent);padding:2px 8px;border-radius:20px;font-weight:600;}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  input[type=text], textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:13.5px;font-family:inherit;background:#FBFCFD;color:var(--ink);resize:vertical;}
  input[type=text]:focus, textarea:focus{outline:none;border-color:var(--accent);}
  .field{margin-bottom:12px;}

  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
  .btn:hover{background:#0B6564;}
  .btn:disabled{opacity:.6;cursor:not-allowed;}
  .btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line);}
  .btn.secondary:hover{background:#F4F6F8;}
  .btn.danger{background:#fff;color:var(--bad);border:1px solid #F0D2CC;padding:5px 10px;font-size:12px;}
  .btn.danger:hover{background:var(--bad-soft);}

  .spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .doc-item{border:1px solid var(--line);border-radius:8px;padding:11px 12px;margin-bottom:8px;}
  .doc-item .row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .doc-item .title{font-size:13.5px;font-weight:600;}
  .doc-item .meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .tag{display:inline-block;font-size:10.5px;background:var(--wait-soft);color:var(--wait);padding:1px 7px;border-radius:20px;font-weight:600;margin-right:5px;}
  .tag.guide{background:var(--good-soft);color:var(--good);}

  .chunks-toggle{font-size:11.5px;color:var(--accent);cursor:pointer;margin-top:6px;display:inline-block;}
  .chunk-list{margin-top:8px;border-top:1px dashed var(--line);padding-top:8px;}
  .chunk-list .chunk{font-size:12px;color:var(--muted);background:#FAFBFC;border-radius:6px;padding:7px 9px;margin-bottom:6px;}
  .chunk-list .chunk b{color:var(--ink);}

  .answer-box{background:#FAFBFC;border:1px solid var(--line);border-radius:8px;padding:14px;margin-top:14px;}
  .answer-box .q{font-size:12.5px;color:var(--muted);margin-bottom:8px;}
  .answer-box .a{font-size:14px;line-height:1.55;white-space:pre-wrap;}

  .citations{margin-top:12px;}
  .citations .cite-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin-bottom:6px;}
  .citation{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px;background:#fff;}
  .citation .src{font-weight:600;color:var(--accent);display:flex;justify-content:space-between;}
  .citation .snippet{color:var(--muted);margin-top:4px;}

  .history-item{border-bottom:1px solid var(--line);padding:10px 0;}
  .history-item:last-child{border-bottom:none;}
  .history-item .q{font-size:13px;font-weight:600;}
  .history-item .a{font-size:12.5px;color:var(--muted);margin-top:3px;}
  .history-item .time{font-size:10.5px;color:#98A2B0;margin-top:4px;}

  .empty{color:var(--muted);font-size:12.5px;padding:14px 0;text-align:center;}
  .error-banner{background:var(--bad-soft);color:var(--bad);border-radius:8px;padding:10px 12px;font-size:12.5px;margin-bottom:12px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Change this to your deployed backend URL when hosting the frontend separately
const API = "http://localhost:4001/api";

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const diffMs = Date.now() - d.getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return mins + "m ago";
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + "h ago";
  return d.toLocaleDateString();
}

function DocumentItem({ doc, onDelete }) {
  const [expanded, setExpanded] = useState(false);
  const [chunks, setChunks] = useState(null);
  const [loadingChunks, setLoadingChunks] = useState(false);

  const toggle = async () => {
    if (!expanded && chunks === null) {
      setLoadingChunks(true);
      try {
        const res = await fetch(`${API}/documents/${doc.id}/chunks`);
        const data = await res.json();
        setChunks(data);
      } catch (e) {
        setChunks([]);
      }
      setLoadingChunks(false);
    }
    setExpanded(!expanded);
  };

  return (
    <div className="doc-item">
      <div className="row">
        <div>
          <div className="title">{doc.title}</div>
          <div className="meta">
            <span className={"tag" + (doc.sourceType === "guide" ? " guide" : "")}>{doc.sourceType}</span>
            {doc.chunkCount} chunk{doc.chunkCount === 1 ? "" : "s"} &middot; uploaded {timeAgo(doc.uploadedAt)}
          </div>
        </div>
        <button className="btn danger" onClick={() => onDelete(doc.id)}>Delete</button>
      </div>
      <div className="chunks-toggle" onClick={toggle}>
        {expanded ? "Hide chunks" : "View chunks"} {loadingChunks ? "..." : ""}
      </div>
      {expanded && chunks && (
        <div className="chunk-list">
          {chunks.length === 0 && <div className="empty">No chunks found.</div>}
          {chunks.map(c => (
            <div className="chunk" key={c.id}><b>#{c.chunkIndex}</b> — {c.content}</div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [documents, setDocuments] = useState([]);
  const [history, setHistory] = useState([]);
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [sourceType, setSourceType] = useState("manual");
  const [uploading, setUploading] = useState(false);
  const [uploadError, setUploadError] = useState(null);

  const [question, setQuestion] = useState("");
  const [asking, setAsking] = useState(false);
  const [answer, setAnswer] = useState(null);
  const [askError, setAskError] = useState(null);

  const loadDocuments = useCallback(async () => {
    try {
      const res = await fetch(`${API}/documents`);
      const data = await res.json();
      setDocuments(Array.isArray(data) ? data : []);
    } catch (e) {
      setDocuments([]);
    }
  }, []);

  const loadHistory = useCallback(async () => {
    try {
      const res = await fetch(`${API}/query-log`);
      const data = await res.json();
      setHistory(Array.isArray(data) ? data : []);
    } catch (e) {
      setHistory([]);
    }
  }, []);

  useEffect(() => {
    loadDocuments();
    loadHistory();
  }, [loadDocuments, loadHistory]);

  const totalChunks = documents.reduce((sum, d) => sum + d.chunkCount, 0);

  const handleUpload = async (e) => {
    e.preventDefault();
    if (!title.trim() || !content.trim()) return;
    setUploading(true);
    setUploadError(null);
    try {
      const res = await fetch(`${API}/documents`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, content, sourceType })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Upload failed");
      setTitle("");
      setContent("");
      await loadDocuments();
    } catch (err) {
      setUploadError(err.message);
    }
    setUploading(false);
  };

  const handleDelete = async (id) => {
    await fetch(`${API}/documents/${id}`, { method: "DELETE" });
    await loadDocuments();
  };

  const handleAsk = async (e) => {
    e.preventDefault();
    if (!question.trim()) return;
    setAsking(true);
    setAskError(null);
    setAnswer(null);
    try {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Query failed");
      setAnswer(data);
      await loadHistory();
    } catch (err) {
      setAskError(err.message);
    }
    setAsking(false);
  };

  return (
    <div className="shell">
      <header className="top">
        <div className="brand">
          <div className="brand-mark">AI</div>
          <div>
            <h1>Internal Knowledge Assistant</h1>
            <div className="sub">Retrieval-Augmented Generation over internal IT/HR documents</div>
          </div>
        </div>
      </header>

      <div className="grid-top">
        <div className="stat">
          <div className="label">Documents</div>
          <div className="value">{documents.length}</div>
        </div>
        <div className="stat">
          <div className="label">Total Chunks</div>
          <div className="value">{totalChunks}</div>
        </div>
        <div className="stat">
          <div className="label">Questions Asked</div>
          <div className="value">{history.length}</div>
        </div>
        <div className="stat">
          <div className="label">Retrieval Method</div>
          <div className="value" style={{ fontSize: "14px" }}>Cosine similarity</div>
        </div>
      </div>

      <div className="layout">
        {/* LEFT: Knowledge base */}
        <div>
          <div className="panel">
            <h2>Add a document <span className="badge">ingest</span></h2>
            <form onSubmit={handleUpload}>
              <div className="field">
                <label>Title</label>
                <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Remote Work Policy" />
              </div>
              <div className="field">
                <label>Source type</label>
                <input type="text" value={sourceType} onChange={e => setSourceType(e.target.value)} placeholder="policy / guide / manual" />
              </div>
              <div className="field">
                <label>Content</label>
                <textarea rows="6" value={content} onChange={e => setContent(e.target.value)} placeholder="Paste the document text here..."></textarea>
              </div>
              {uploadError && <div className="error-banner">{uploadError}</div>}
              <button className="btn" type="submit" disabled={uploading}>
                {uploading && <span className="spinner"></span>}
                {uploading ? "Chunking & embedding..." : "Ingest document"}
              </button>
            </form>
          </div>

          <div className="panel">
            <h2>Knowledge base <span className="badge">{documents.length} docs</span></h2>
            {documents.length === 0 && <div className="empty">No documents yet. Add one above.</div>}
            {documents.map(doc => (
              <DocumentItem key={doc.id} doc={doc} onDelete={handleDelete} />
            ))}
          </div>
        </div>

        {/* RIGHT: Ask */}
        <div>
          <div className="panel">
            <h2>Ask a question <span className="badge">RAG</span></h2>
            <form onSubmit={handleAsk}>
              <div className="field">
                <textarea rows="3" value={question} onChange={e => setQuestion(e.target.value)} placeholder="e.g. How long does it take to get a corporate card approved?"></textarea>
              </div>
              {askError && <div className="error-banner">{askError}</div>}
              <button className="btn" type="submit" disabled={asking}>
                {asking && <span className="spinner"></span>}
                {asking ? "Retrieving & generating..." : "Ask"}
              </button>
            </form>

            {answer && (
              <div className="answer-box">
                <div className="q">Q: {answer.question}</div>
                <div className="a">{answer.answer}</div>
                {answer.citations && answer.citations.length > 0 && (
                  <div className="citations">
                    <div className="cite-label">Sources retrieved</div>
                    {answer.citations.map((c, i) => (
                      <div className="citation" key={i}>
                        <div className="src">
                          <span>{c.documentTitle} · excerpt #{c.chunkIndex}</span>
                          <span>score {c.score}</span>
                        </div>
                        <div className="snippet">{c.snippet}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          <div className="panel">
            <h2>Recent questions <span className="badge">history</span></h2>
            {history.length === 0 && <div className="empty">No questions asked yet.</div>}
            {history.map(h => (
              <div className="history-item" key={h.id}>
                <div className="q">{h.question}</div>
                <div className="a">{h.answer}</div>
                <div className="time">{timeAgo(h.createdAt)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
